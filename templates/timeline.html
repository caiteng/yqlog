{% extends 'layout.html' %}
{% block title %}记录流 - 语沁成长记录{% endblock %}
{% block content %}
<section class="panel">
  <h2>成长记录流</h2>
  <p class="subtle">按时间倒序看语沁每一次喝奶和拉臭臭记录。</p>
  {% for row in records %}
    <article class="timeline-item">
      <h3>{{ row.type }} · {{ row.time }}</h3>
      <p>{{ row.detail }}</p>
    </article>
  {% else %}
    <article class="timeline-item empty">
      <h3>还没有记录</h3>
      <p>去快捷录入页，几秒就能记一条。</p>
      <a class="btn btn-soft" href="{{ url_for('quick_entry') }}">去记录</a>
    </article>
  {% endfor %}
</section>
{% endblock %}
