{% extends 'layout.html' %}
{% block title %}时间线 - 语沁成长记录{% endblock %}
{% block content %}
<section class="panel">
  <div class="panel-head">
    <h2>成长时间线</h2>
    <a class="btn btn-soft" href="{{ url_for('quick_entry') }}">去记录</a>
  </div>
  {% for row in records %}
    <article class="timeline-item">
      <h3>{{ row.type }} · {{ row.time }}</h3>
      <p>{{ row.detail }}</p>
    </article>
  {% else %}
    <article class="timeline-item empty">
      <h3>还没有记录</h3>
      <p>先新增一条记录吧。</p>
      <a class="btn btn-primary" href="{{ url_for('quick_entry') }}">立即记录</a>
    </article>
  {% endfor %}
</section>
{% endblock %}
