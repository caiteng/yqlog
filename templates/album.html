{% extends 'layout.html' %}
{% block title %}语沁相册 - 语沁成长记录{% endblock %}
{% block content %}
<section class="panel" id="albumApp">
  <h2>语沁温馨相册</h2>
  <p class="subtle">支持上传、预览、删除，移动端也能轻松操作。</p>

  <form class="mobile-form" method="post" action="{{ url_for('album_upload') }}" enctype="multipart/form-data" @submit="onSubmit">
    <label class="upload-btn">
      <span>📷 选择照片（可多选）</span>
      <input type="file" name="photos" accept="image/*" multiple @change="onFilesChange" />
    </label>
    <div class="photo-preview" v-if="previews.length">
      <img v-for="img in previews" :key="img.name" :src="img.url" :alt="img.name" />
    </div>
    <button class="btn btn-primary" type="submit" :disabled="submitting">[[ submitting ? '上传中...' : '上传到相册' ]]</button>
  </form>

  <div class="photo-grid album-grid">
    {% for photo in photos %}
    <article class="album-item">
      <a href="{{ url_for('uploaded_file', filename=photo.image_path) }}" target="_blank" rel="noreferrer">
        <img src="{{ url_for('uploaded_file', filename=photo.image_path) }}" alt="语沁成长照片" loading="lazy" />
      </a>
      <small>{{ photo.created_at }}</small>
      <form method="post" action="{{ url_for('album_delete', photo_id=photo.id) }}" onsubmit="return confirm('确认删除这张照片吗？')">
        <button class="btn btn-soft" type="submit">删除</button>
      </form>
    </article>
    {% else %}
      <p class="subtle">相册还是空的，上传第一张照片吧 ✨</p>
    {% endfor %}
  </div>
</section>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="{{ url_for('static', filename='js/album-vue.js') }}"></script>
{% endblock %}
