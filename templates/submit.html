{% extends 'layout.html' %}
{% block title %}H5提交 - 语沁成长记录{% endblock %}
{% block content %}
<section class="panel form-panel">
  <h2>H5提交成长信息</h2>
  <form method="post" enctype="multipart/form-data" class="mobile-form">
    <label>记录日期
      <input type="date" name="record_date" required />
    </label>
    <label>身高(cm)
      <input type="number" step="0.1" name="height_cm" placeholder="例如 85.6" />
    </label>
    <label>体重(kg)
      <input type="number" step="0.1" name="weight_kg" placeholder="例如 11.2" />
    </label>
    <label>头围(cm)
      <input type="number" step="0.1" name="head_circumference_cm" placeholder="例如 47.1" />
    </label>
    <label>备注
      <textarea name="note" rows="3" placeholder="今天会自己说完整句子了～"></textarea>
    </label>
    <label>照片（可多选）
      <input type="file" name="photos" accept="image/*" multiple />
    </label>
    <button type="submit">提交</button>
  </form>
</section>
{% endblock %}
