{% extends 'layout.html' %}
{% block title %}快捷录入 - 语沁成长记录{% endblock %}
{% block content %}
<section class="panel quick-panel" id="quickApp">
  <h2>快捷录入</h2>
  <p class="subtle">一眼可见，一键进入，适合手机单手快速记录。</p>
  <div class="quick-grid">
    <a class="quick-card" href="{{ url_for('milk_record') }}">
      <div class="quick-icon">🍼</div>
      <h3>喝奶</h3>
      <p>记录时间 + ML 数</p>
    </a>
    <a class="quick-card" href="{{ url_for('poop_record') }}">
      <div class="quick-icon">💩</div>
      <h3>拉臭臭</h3>
      <p>记录时间 + 状态</p>
    </a>
    <a class="quick-card" href="{{ url_for('album') }}">
      <div class="quick-icon">📷</div>
      <h3>相册上传</h3>
      <p>上传 / 预览 / 删除</p>
    </a>
  </div>
</section>
{% endblock %}
