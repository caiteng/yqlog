<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#ff8bb3" />
  <title>{% block title %}语沁成长记录{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <header class="topbar">
    <a class="brand" href="{{ url_for('index') }}">
      <span class="brand-logo">🌸</span>
      <div>
        <strong>语沁成长记录</strong>
        <small>轻量 · 温馨 · 手机友好</small>
      </div>
    </a>
    <nav>
      <a href="{{ url_for('index') }}">首页看板</a>
      <a href="{{ url_for('quick_entry') }}">快捷录入</a>
      <a href="{{ url_for('album') }}">相册</a>
      <a href="{{ url_for('timeline') }}">记录流</a>
      <a href="{{ url_for('unlock') }}">解锁</a>
    </nav>
  </header>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-wrap">
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}" role="status">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
