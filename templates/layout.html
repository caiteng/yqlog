<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#ff8bb3" />
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <header class="topbar">
    <a class="brand" href="{{ url_for('index') }}">
      <span class="brand-logo">🌸</span>
      <strong>{{ app_name }}</strong>
    </a>
    <nav class="desktop-nav" aria-label="主导航">
      <a href="{{ url_for('index') }}">首页</a>
      <a href="{{ url_for('quick_entry') }}">快捷记录</a>
      <a href="{{ url_for('album') }}">相册</a>
      <a href="{{ url_for('timeline') }}">时间线</a>
      <a class="btn btn-soft nav-unlock" href="{{ url_for('unlock') }}">🔓 解锁</a>
    </nav>
  </header>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-wrap">
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}" role="status">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <nav class="mobile-tabbar" aria-label="底部导航">
    <a href="{{ url_for('index') }}">🏠<span>首页</span></a>
    <a href="{{ url_for('quick_entry') }}">🍼<span>记录</span></a>
    <a href="{{ url_for('album') }}">📷<span>相册</span></a>
    <a href="{{ url_for('timeline') }}">🕒<span>时间线</span></a>
  </nav>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
